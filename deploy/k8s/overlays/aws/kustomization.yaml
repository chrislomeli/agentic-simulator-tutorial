# aws: EKS. Profile = aws (graph client = Bedrock AgentCore adapter).
# Postgres = RDS — that is *only* a different POSTGRES_URL (same adapter),
# which is the whole point of the store seam. POSTGRES_URL / broker creds
# should come from a real Secret, not this ConfigMap, in a real cluster.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: wildfire
resources:
  - ../../base
images:
  - name: wildfire
    newName: <your-account>.dkr.ecr.<region>.amazonaws.com/wildfire
    newTag: latest
patches:
  - target:
      kind: ConfigMap
      name: wildfire-config
    patch: |
      - op: replace
        path: /data/DEPLOYMENT_PROFILE
        value: "aws"
      - op: replace
        path: /data/POSTGRES_URL
        value: "postgresql://wildfire:CHANGE_ME@your-rds-endpoint:5432/wildfire"

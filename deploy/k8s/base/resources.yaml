# Base manifests — the split topology as Kubernetes objects:
#   producer Deployment  → EventQueue (broker)
#   consumer Deployment  → GraphClient port → graph
#   graph    Deployment + Service (the FastAPI graph; body lands in the API step)
#
# Skeleton, deliberately minimal: one image, role = container `command`,
# all config via the ConfigMap. Overlays set the profile + image. The DB
# is NOT modelled here — k8s-desktop points at the compose Postgres / a
# local PVC; the aws overlay points at RDS (just POSTGRES_URL). Helm and a
# Skaffold/Tilt inner loop are intentionally out of scope (stated tutorial
# trade-off) — Kustomize keeps the topology readable without templating.
---
apiVersion: v1
kind: Namespace
metadata:
  name: wildfire
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wildfire-config
  namespace: wildfire
data:
  # Overlays patch DEPLOYMENT_PROFILE. Everything else is wiring the
  # profile reads. POSTGRES_URL/EVENT_BROKER_URL/GRAPH_SERVICE_URL are
  # placeholders an overlay (or a real Secret) replaces.
  DEPLOYMENT_PROFILE: "k8s-deployed"
  STORE_BACKEND: "postgres"
  POSTGRES_URL: "postgresql://wildfire:wildfire@postgres:5432/wildfire"
  EVENT_BROKER_URL: "redis://broker:6379"
  GRAPH_SERVICE_URL: "http://graph:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
  namespace: wildfire
spec:
  replicas: 1
  selector:
    matchLabels: { app: producer }
  template:
    metadata:
      labels: { app: producer }
    spec:
      containers:
        - name: producer
          image: wildfire:latest
          command: ["wildfire-producer"]
          envFrom:
            - configMapRef: { name: wildfire-config }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: wildfire
spec:
  replicas: 1
  selector:
    matchLabels: { app: consumer }
  template:
    metadata:
      labels: { app: consumer }
    spec:
      containers:
        - name: consumer
          image: wildfire:latest
          command: ["wildfire-consumer"]
          envFrom:
            - configMapRef: { name: wildfire-config }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph
  namespace: wildfire
spec:
  replicas: 1
  selector:
    matchLabels: { app: graph }
  template:
    metadata:
      labels: { app: graph }
    spec:
      containers:
        - name: graph
          image: wildfire:latest
          # The FastAPI graph service is built in the API step. Until then
          # this is a placeholder command so the manifest is complete and
          # `kustomize build` validates.
          command: ["python", "-c", "print('graph service: built in the API step'); import time; time.sleep(3600)"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: { name: wildfire-config }
---
apiVersion: v1
kind: Service
metadata:
  name: graph
  namespace: wildfire
spec:
  selector: { app: graph }
  ports:
    - port: 8000
      targetPort: 8000
